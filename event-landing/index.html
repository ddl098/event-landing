<!DOCTYPE html>
<html>
<head>
  <title>My Event</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Helvetica, Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    /* Background video */
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center center;
      z-index: -1;
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 30px;
      letter-spacing: 2px;
      font-weight: 300;
    }

    .button {
      padding: 15px 40px;
      font-size: 18px;
      border: 1px solid white;
      background: transparent;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .button:hover {
      background: white;
      color: black;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <!-- Video Background -->
  <video autoplay muted loop playsinline>
    <source src="background.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>PAGEANT @ HANGAR 1819 - 3/21</h1>
    <a class="button" href="https://hangar1819.com/event/446" target="_blank">
      GET TICKETS
    </a>
  </div>

</body>
</html>
