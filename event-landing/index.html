<!DOCTYPE html>
<html>
<head>
  <title>PAGEANT @ HANGAR 1819</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Helvetica, Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    /* Desktop Video */
    .video-desktop {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: translate(-50%, -50%);
      z-index: -1;
    }

    /* Mobile Video */
    .video-mobile {
      display: none;
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 30px;
      letter-spacing: 2px;
      font-weight: 300;
    }

    .button {
      padding: 15px 40px;
      font-size: 18px;
      border: 1px solid white;
      background: transparent;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .button:hover {
      background: white;
      color: black;
    }

    /* Responsive for smaller screens */
    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .video-desktop {
        display: none; /* hide desktop video */
      }

      .video-mobile {
        display: block; /* show mobile video */
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        transform: translate(-50%, -50%);
        z-index: -1;
      }
    }
  </style>
</head>

<body>

  <!-- Desktop Video -->
  <video class="video-desktop" autoplay muted loop playsinline>
    <source src="https://YOURUSERNAME.github.io/YOURREPO/background-desktop.mp4?v=3" type="video/mp4">
  </video>

  <!-- Mobile Video -->
  <video class="video-mobile" autoplay muted loop playsinline>
    <source src="https://YOURUSERNAME.github.io/YOURREPO/background-mobile.mp4?v=3" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>PAGEANT @ HANGAR 1819 - 3/21</h1>
    <a class="button" href="https://hangar1819.com/event/446" target="_blank">
      GET TICKETS
    </a>
  </div>

</body>
</html>
